<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Trip Packing ✨</title>
    <style>
        :root {
            --bg: #faf7f2;      /* 背景：温かみのあるサンドホワイト */
            --main: #d1b799;    /* メイン：ご指定のラテベージュ */
            --sub: #b5a18d;     /* サブ：濃いめのグレージュ */
            --accent: #eaddcf;  /* アクセント：淡いベージュ */
            --text: #5c544e;    /* 文字色：柔らかいダークブラウン */
            --done-bg: #f2f0ed; /* 完了済み：落ち着いたグレーベージュ */
        }

        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Meiryo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 15px; margin: 0; line-height: 1.4;
        }

        .container {
            max-width: 550px; margin: 0 auto; background: white;
            border-radius: 30px; box-shadow: 0 10px 30px rgba(209, 183, 153, 0.15);
            padding: 20px; border: 1px solid #efe8e0;
        }

        h1 { text-align: center; color: var(--main); font-size: 1.3rem; margin: 10px 0 15px; letter-spacing: 1px; }

        /* 性別切り替えタブ */
        .gender-switch {
            display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;
        }
        .gender-btn {
            background: #fff; border: 2px solid var(--accent); color: var(--sub);
            padding: 10px 25px; border-radius: 20px; cursor: pointer; font-weight: bold;
            font-size: 0.9rem; transition: 0.3s;
        }
        .gender-btn.active {
            background: var(--main); border-color: var(--main); color: white;
            box-shadow: 0 4px 10px rgba(209, 183, 153, 0.3);
        }

        /* 設定エリア */
        .config {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
            background: #fdfcfb; padding: 18px; border-radius: 20px; border: 1px solid #f0ede9;
        }
        .full { grid-column: span 2; }
        label { font-size: 0.75rem; font-weight: bold; color: var(--sub); margin-bottom: 5px; display: block; }
        
        select, input {
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #eaddcf; 
            margin-top: 4px; box-sizing: border-box; font-family: inherit; font-size: 0.9rem; color: var(--text);
            background: #fff;
        }

        .btn-update {
            grid-column: span 2; background: var(--main);
            color: white; border: none; padding: 14px; border-radius: 25px; 
            font-weight: bold; cursor: pointer; margin-top: 5px; transition: 0.3s;
        }
        .btn-update:hover { opacity: 0.8; }

        .add-custom { margin: 20px 0; display: flex; gap: 10px; }
        .add-custom input { flex: 1; margin: 0; background: #fff; }
        .btn-add { background: var(--accent); color: var(--text); border: none; padding: 0 18px; border-radius: 12px; cursor: pointer; font-weight: bold; }

        .cat-title { font-size: 0.95rem; font-weight: bold; color: var(--sub); margin: 25px 0 12px; border-left: 4px solid var(--main); padding-left: 10px; }

        /* アイテム行 */
        .item-row {
            background: #fff; border: 1px solid #f0ede9; padding: 12px 15px;
            border-radius: 18px; margin-bottom: 10px; transition: 0.3s;
        }

        .item-main-flex { display: flex; align-items: center; }
        .item-main { display: flex; align-items: center; cursor: pointer; flex: 1; font-size: 0.88rem; font-weight: bold; }
        .check-box { 
            width: 20px; height: 20px; border: 2px solid var(--accent); 
            border-radius: 50%; margin-right: 12px; flex-shrink: 0; position: relative;
        }
        
        .checked .check-box { background: var(--main); border-color: var(--main); }
        .checked .check-box::after { content: '✓'; color: white; position: absolute; left: 4px; top: -1px; font-weight: bold; font-size: 14px; }
        .checked .parent-label { text-decoration: line-through; color: #b5b5b5; }

        .btn-delete {
            background: none; border: none; color: #dcd6d0; cursor: pointer; font-size: 1rem;
            padding: 5px; transition: 0.2s;
        }
        .btn-delete:hover { color: #b5a18d; }

        /* 小項目（サブアイテム） */
        .sub-container {
            margin: 10px 0 5px 32px; padding: 10px; background: #faf9f7; 
            border-radius: 12px; border: 1px dashed #eaddcf;
        }
        .sub-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 0.8rem; cursor: pointer; color: var(--text); }
        .sub-item:last-child { margin-bottom: 0; }
        .sub-check { width: 16px; height: 16px; border: 1.5px solid #dcd6d0; border-radius: 4px; margin-right: 10px; background: white; }
        .sub-checked .sub-check { background: var(--sub); border-color: var(--sub); position: relative; }
        .sub-checked .sub-check::after { content: '✓'; color: white; font-size: 10px; position: absolute; left: 2px; top: -1px; }

        #done-section { margin-top: 40px; border-top: 2px dotted #eaddcf; padding-top: 10px; }
        .item-row.checked { background: var(--done-bg); border-color: transparent; }
    </style>
</head>
<body>

<div class="container">
    <h1>🧺My Packing List</h1>

    <div class="gender-switch">
        <button id="btn-female" class="gender-btn active" onclick="setGender('female')">👩 女性向け</button>
        <button id="btn-male" class="gender-btn" onclick="setGender('male')">👨 男性向け</button>
    </div>

    <div class="config">
        <div>
            <label>🌏エリア</label>
            <select id="area" onchange="toggleCountry(); initList();">
                <option value="domestic">国内旅行🇯🇵</option>
                <option value="overseas">海外旅行✈️</option>
            </select>
        </div>
        <div id="country-div" style="display:none;">
            <label>📍行き先</label>
            <select id="country" onchange="initList()">
                <option value="general">🌍その他一般</option>
                <option value="usa">🇺🇸アメリカ/チップ圏</option>
                <option value="korea">🇰🇷韓国</option>
                <option value="taiwan">🇹🇼台湾</option>
                <option value="thai">🐘タイ/東南アジア</option>
                <option value="europe">🏰ヨーロッパ</option>
            </select>
        </div>
        <div class="full">
            <label>🌡️季節</label>
            <select id="season" onchange="initList()">
                <option value="summer">☀️夏（暑い時期）</option>
                <option value="winter">❄️冬（寒い時期）</option>
            </select>
        </div>
        <div class="full">
            <label>🌙宿泊数</label>
            <input type="number" id="nights" value="1" onchange="initList()">
        </div>
        <button class="btn-update" onclick="resetAll()">全チェック解除🔄</button>
    </div>

    <div class="add-custom">
        <input type="text" id="custom-input" placeholder="自分だけの持ち物を追加...">
        <button class="btn-add" onclick="addCustomItem()">追加</button>
    </div>

    <div id="todo-list"></div>
    
    <div id="done-section">
        <div class="cat-title">✅準備完了！</div>
        <div id="done-list"></div>
    </div>
</div>

<script>
    // データの定義（gender属性を追加）
    const packingMaster = [
        {
            category: "💳貴重品・重要書類（共通）",
            items: [
                { name: "基本セット👛", subs: ["財布・現金👛", "身分証🪪", "クレジットカード💳", "予備の財布👛"] },
                { name: "ガジェット🔋", subs: ["スマホ📱", "充電器🔌", "モバイルバッテリー🔋", "変換プラグ🔌", "電源タップ🔌⚡️"] },
                { name: "重要書類控📄", isOverseas: true, subs: ["パスポート📕", "パスポートコピー📄", "航空券eチケット控え🎫", "ホテル予約確認書🏨"] },
                { name: "海外便利グッズ✈️", isOverseas: true, subs: ["ノイズキャンセリングイヤホン🎧", "SIMピン📍", "液体物用ジッパー袋🛍️"] },
                { name: "その他日用品🛍️", subs: ["エコバッグ🛍️", "メガネ・コンタクト👓", "筆記用具🖊️", "折りたたみ傘⛱️"] }
            ]
        },
        {
            category: "🧴美容・バス用品（女性向け）",
            gender: "female",
            items: [
                { name: "スキンケア✨", subs: ["クレンジング🧼", "洗顔🫧", "導入液✨", "化粧水💧", "乳液🧴", "美容液✨", "クリーム🧴", "フェイシャルパック🎭"] },
                { name: "メイク💄", subs: ["下地💄", "ファンデ🎨", "パウダー✨", "アイブロウ✏️", "アイシャドウ🎨", "マスカラ👁️", "チーク😊", "リップ💄"] },
                { name: "ヘア・ボディケア🛁", subs: ["シャンプー類🧴", "ヘアオイル✨", "ボディクリーム🧴", "ヘアアイロン💇‍♀️", "ヘアブラシ🪮", "卓上ミラー🪞"] }
            ]
        },
        {
            category: "👨身だしなみ・エチケット（男性向け）",
            gender: "male",
            items: [
                { name: "フェイシャルケア🫧", subs: ["洗顔料（スクラブ/炭など）🫧", "オールインワンジェル🧴", "リップクリーム（無香料）🪞"] },
                { name: "シェービング🪒", subs: ["髭剃り（使い慣れたもの）🪒", "シェービングジェル🫧", "アフターシェーブローション🧴"] },
                { name: "ヘアケア・その他✂️", subs: ["ヘアワックス/ポマード💇‍♂️", "携帯用ヘアスプレー💨", "鼻毛カッター✂️", "爪切り💅"] },
                { name: "ニオイ・日焼け対策☀️", subs: ["日焼け止め（ジェルタイプ）🧴", "ボディシート（汗対策）🧊", "携帯用香水/アトマイザー🌬️"] }
            ]
        },
        {
            category: "👗衣類・日用品（共通/女性寄り）",
            items: [
                { name: "お洋服👕", hasQty: true, gender: "female", subs: ["着替え👕", "下着👙", "靴下・タイツ🧦"] }, // 女性向け数量あり
                { name: "お洋服👕", hasQty: true, gender: "male", subs: ["シャツ・Tシャツ👕", "予備の白Tシャツ👕", "ズボン・スラックス👖", "下着（ボクサー等）🩳", "靴下🧦", "ベルト👔"] }, // 男性向け数量あり
                { name: "おやすみ・ケア🛌", subs: ["パジャマ🛌", "着圧ソックス🧦", "室内スリッパ👟"] },
                { name: "衛生用品🩹", subs: ["ハンカチ🧼", "ウェットティッシュ🫧", "絆創膏🩹", "除菌ジェル🫧", "生理用品🎀", "流せるティッシュ🧻"] },
                { name: "お洗濯グッズ🧼", gender: "male", subs: ["ランドリーバッグ🛍️"] } // 男性向けに追加
            ]
        },
        {
            category: "🩹薬品類・海外特化（共通）",
            items: [
                { name: "常備薬💊", subs: ["鎮痛剤💊", "胃腸薬💊", "下痢止め💊", "正露丸🫙"] },
                { name: "海外お役立ち✈️", isOverseas: true, subs: ["歯ブラシセット🪥", "携帯用スリッパ👟", "強力虫除け🦟"] }
            ]
        },
        {
            category: "📍地域・季節特化",
            items: [
                { name: "夏限定☀️", isSummer: true, subs: ["日傘⛱️", "日焼け止め🧴", "サングラス🕶️", "汗拭きシート🧊"] },
                { name: "夏限定（男性向け）☀️", isSummer: true, gender: "male", subs: ["速乾Tシャツ👕", "短パン🩳", "帽子（キャップ）🧢", "スポーツサンダル🩴", "クールスプレー❄️"] },
                { name: "冬限定❄️", isWinter: true, subs: ["使い捨てカイロ♨️", "マフラー🧣", "手袋（スマホ対応）🧤", "保湿バーム🍯", "ハンドクリーム🧴"] },
                { name: "冬限定（男性向け）❄️", isWinter: true, gender: "male", subs: ["ヒートテック（上下）👕", "厚手セーター🧶", "インナーダウン🧥", "厚手の靴下🧦"] },
                { name: "チップ・マナー国💵", target: ["usa", "europe"], subs: ["チップ用小額紙幣💵", "防犯バッグ🔒"] },
                { name: "ドレスコード国👔", target: ["usa", "europe"], gender: "male", subs: ["襟付きシャツ👔", "革靴/クリーンな靴👟"] }, // 男性向け
                { name: "韓国お役立ち🇰🇷", target: "korea", subs: ["WOWPASS💳", "美活用保冷バッグ❄️"] },
                { name: "衛生注意国🌏", target: "thai", subs: ["携帯用ウォシュレット🚿🥢"] }
            ]
        }
    ];

    // ローカルストレージのキーをv11に更新（男女切り替え対応のためリセット）
    let currentGender = localStorage.getItem('my_gender_v11') || 'female';
    let customItems = JSON.parse(localStorage.getItem('my_custom_v11') || '[]');
    let checkedItems = JSON.parse(localStorage.getItem('my_checked_v11') || '[]');
    let deletedItems = JSON.parse(localStorage.getItem('my_deleted_v11') || '[]');

    function toggleCountry() {
        document.getElementById('country-div').style.display = (document.getElementById('area').value === 'overseas') ? 'block' : 'none';
    }

    function setGender(gender) {
        currentGender = gender;
        localStorage.setItem('my_gender_v11', gender);
        
        // ボタンの見た目を更新
        document.getElementById('btn-female').classList.toggle('active', gender === 'female');
        document.getElementById('btn-male').classList.toggle('active', gender === 'male');
        
        initList(); // リストを再描画
    }

    function initList() {
        const todoContainer = document.getElementById('todo-list');
        const doneContainer = document.getElementById('done-list');
        todoContainer.innerHTML = '';
        doneContainer.innerHTML = '';

        const area = document.getElementById('area').value;
        const country = document.getElementById('country').value;
        const season = document.getElementById('season').value;
        const nights = parseInt(document.getElementById('nights').value);

        packingMaster.forEach(cat => {
            // カテゴリー全体の性別フィルタ
            if (cat.gender && cat.gender !== currentGender) return;

            const catHeader = document.createElement('div');
            catHeader.className = 'cat-title';
            catHeader.innerText = cat.category;
            let catHasItem = false;

            cat.items.forEach(item => {
                // 条件フィルタリング
                if (item.gender && item.gender !== currentGender) return; // アイテム個別の性別フィルタ
                if (item.isOverseas && area === 'domestic') return;
                if (item.isSummer && season === 'winter') return;
                if (item.isWinter && season === 'summer') return;
                if (item.target && !Array.isArray(item.target) && item.target !== country) return;
                if (item.target && Array.isArray(item.target) && !item.target.includes(country)) return;
                if (deletedItems.includes(item.name)) return;

                if (!catHasItem) { todoContainer.appendChild(catHeader); catHasItem = true; }
                renderParentItem(item, nights);
            });
        });

        // じぶんリスト
        if (customItems.length > 0) {
            const customHeader = document.createElement('div');
            customHeader.className = 'cat-title';
            customHeader.innerText = "🧸じぶんリスト";
            todoContainer.appendChild(customHeader);
            customItems.forEach(name => {
                if (!deletedItems.includes(name)) renderParentItem({name: name, subs: []}, 0);
            });
        }
    }

    function renderParentItem(item, nights) {
        const isChecked = checkedItems.includes(item.name);
        const div = document.createElement('div');
        div.className = `item-row ${isChecked ? 'checked' : ''}`;

        let subHtml = "";
        if (item.subs && item.subs.length > 0) {
            subHtml = `<div class="sub-container">`;
            item.subs.forEach(sub => {
                const subKey = `sub_${currentGender}_${item.name}_${sub}`; // 性別をキーに含める
                const isSubChecked = localStorage.getItem(subKey) === 'true';
                subHtml += `
                    <div class="sub-item ${isSubChecked ? 'sub-checked' : ''}" onclick="event.stopPropagation(); toggleSub(this, '${subKey}')">
                        <div class="sub-check"></div>${sub}
                    </div>`;
            });
            subHtml += `</div>`;
        }

        const qtyText = item.hasQty ? `<small style="color:var(--sub);margin-left:5px;"> [${nights+1}枚]</small>` : "";

        div.innerHTML = `
            <div class="item-main-flex">
                <div class="item-main" onclick="toggleParent('${item.name}')">
                    <div class="check-box"></div>
                    <span class="parent-label">${item.name}${qtyText}</span>
                </div>
                <button class="btn-delete" onclick="deleteItem('${item.name}')">🗑️</button>
            </div>
            ${subHtml}
        `;

        if (isChecked) {
            document.getElementById('done-list').appendChild(div);
        } else {
            document.getElementById('todo-list').appendChild(div);
        }
    }

    function toggleParent(name) {
        // 同じ名前のアイテムが男女である場合、現在表示されている方だけを操作
        if (checkedItems.includes(name)) {
            checkedItems = checkedItems.filter(i => i !== name);
        } else {
            checkedItems.push(name);
        }
        save();
        initList();
    }

    function toggleSub(el, key) {
        const isNowChecked = el.classList.toggle('sub-checked');
        localStorage.setItem(key, isNowChecked);
    }

    function deleteItem(name) {
        if (confirm(`${name}を非表示にしますか？`)) {
            deletedItems.push(name);
            save();
            initList();
        }
    }

    function addCustomItem() {
        const input = document.getElementById('custom-input');
        if (input.value.trim()) {
            customItems.push(input.value.trim() + "🏷️");
            save();
            input.value = '';
            initList();
        }
    }

    function resetAll() {
        if (confirm("全てのチェックを解除しますか？")) {
            checkedItems = [];
            localStorage.clear();
            localStorage.setItem('my_gender_v11', currentGender); // 性別設定だけ戻す
            save();
            initList();
        }
    }

    function save() {
        localStorage.setItem('my_custom_v11', JSON.stringify(customItems));
        localStorage.setItem('my_checked_v11', JSON.stringify(checkedItems));
        localStorage.setItem('my_deleted_v11', JSON.stringify(deletedItems));
    }

    // 初期化
    window.onload = () => {
        setGender(currentGender); // 保存されている性別を適用
        toggleCountry();
    };
</script>
</body>
</html>
