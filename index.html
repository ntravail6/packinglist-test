<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Trip Packing ✨</title>
    <style>
        :root {
            /* 女性向け（ラテベージュ） */
            --bg-female: #faf7f2;
            --main-female: #d1b799;
            --sub-female: #b5a18d;
            --accent-female: #eaddcf;
            --text-female: #5c544e;
            --done-female: #f2f0ed;

            /* 男性向け（ブルーグレー） */
            --bg-male: #f0f2f5;
            --main-male: #6789a4;
            --sub-male: #4a6375;
            --accent-male: #cbd5e0;
            --text-male: #2d3748;
            --done-male: #e2e8f0;
        }

        body.mode-female {
            --bg: var(--bg-female); --main: var(--main-female); --sub: var(--sub-female);
            --accent: var(--accent-female); --text: var(--text-female); --done-bg: var(--done-female);
        }
        body.mode-male {
            --bg: var(--bg-male); --main: var(--main-male); --sub: var(--sub-male);
            --accent: var(--accent-male); --text: var(--text-male); --done-bg: var(--done-male);
        }

        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Meiryo', sans-serif;
            background-color: var(--bg); color: var(--text);
            padding: 15px; margin: 0; line-height: 1.4; transition: 0.3s;
        }

        .container {
            max-width: 550px; margin: 0 auto; background: white;
            border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 20px; border: 1px solid rgba(0,0,0,0.02);
        }

        h1 { text-align: center; color: var(--main); font-size: 1.3rem; margin: 10px 0 15px; letter-spacing: 1px; }

        .gender-switch { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .gender-btn {
            flex: 1; background: #fff; border: 2px solid var(--accent); color: var(--sub);
            padding: 12px; border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.3s;
            font-size: 0.9rem; outline: none;
        }
        .gender-btn.active { background: var(--main); border-color: var(--main); color: white; }

        .config {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
            background: #fdfcfb; padding: 18px; border-radius: 20px; border: 1px solid #f0ede9;
        }
        .full { grid-column: span 2; }
        label { font-size: 0.75rem; font-weight: bold; color: var(--sub); margin-bottom: 4px; display: block; }
        select, input {
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--accent); 
            box-sizing: border-box; font-family: inherit; font-size: 0.9rem;
            background: white; color: var(--text);
        }

        .btn-reset {
            grid-column: span 2; background: none; color: var(--sub); border: 1px solid var(--accent); 
            padding: 10px; border-radius: 15px; font-size: 0.8rem; cursor: pointer; margin-top: 5px;
        }

        .cat-title { font-size: 0.95rem; font-weight: bold; color: var(--sub); margin: 25px 0 12px; border-left: 4px solid var(--main); padding-left: 10px; }

        .item-row { background: #fff; border: 1px solid #f0ede9; padding: 12px 15px; border-radius: 18px; margin-bottom: 10px; transition: 0.2s; }
        .item-row.checked { background: var(--done-bg); border-color: transparent; opacity: 0.8; }

        .item-main-flex { display: flex; align-items: center; justify-content: space-between; }
        .item-main { display: flex; align-items: center; cursor: pointer; flex: 1; font-weight: bold; font-size: 0.9rem; }
        
        .check-box { width: 20px; height: 20px; border: 2px solid var(--accent); border-radius: 50%; margin-right: 12px; position: relative; flex-shrink: 0; background: white; }
        .checked .check-box { background: var(--main); border-color: var(--main); }
        .checked .check-box::after { content: '✓'; color: white; position: absolute; left: 4px; top: -1px; font-weight: bold; }
        .checked .item-label { text-decoration: line-through; color: #b5b5b5; }

        .sub-container { margin: 10px 0 0 32px; padding: 8px; background: rgba(0,0,0,0.02); border-radius: 12px; border: 1px dashed var(--accent); }
        .sub-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 0.8rem; }
        .sub-item:last-child { margin-bottom: 0; }
        .sub-content { display: flex; align-items: flex-start; cursor: pointer; flex: 1; }
        .sub-check { width: 16px; height: 16px; border: 1.5px solid var(--accent); border-radius: 4px; margin-right: 8px; background: white; position: relative; flex-shrink: 0; margin-top: 2px; }
        .sub-checked .sub-check { background: var(--sub); border-color: var(--sub); }
        .sub-checked .sub-check::after { content: '✓'; color: white; font-size: 10px; position: absolute; left: 2px; top: -1px; }
        .sub-checked span { text-decoration: line-through; color: #b5b5b5; }

        .memo { display: block; font-size: 0.7rem; color: #999; margin-top: 2px; line-height: 1.2; font-weight: normal; }

        .btn-del-sub { background: none; border: none; color: #dcd6d0; cursor: pointer; font-size: 0.9rem; padding: 5px; transition: 0.2s; }
        .btn-del-sub:hover { color: #e57373; }
    </style>
</head>
<body id="body" class="mode-female">

<div class="container">
    <h1>🧺 My Packing List</h1>

    <div class="gender-switch">
        <button id="btn-female" class="gender-btn active" onclick="setGender('female')">👩 女性向け</button>
        <button id="btn-male" class="gender-btn" onclick="setGender('male')">👨 男性向け</button>
    </div>

    <div class="config">
        <div>
            <label>🌏 エリア</label>
            <select id="area" onchange="toggleOverseas(); initList();">
                <option value="domestic">国内旅行🇯🇵</option>
                <option value="overseas">海外旅行✈️</option>
            </select>
        </div>
        <div>
            <label>🌙 宿泊数</label>
            <input type="number" id="nights" value="1" min="0" onchange="initList()">
        </div>
        <div id="style-div" class="full" style="display:none;">
            <label>📍 旅行スタイル・渡航先</label>
            <select id="tripStyle" onchange="initList()">
                <option value="city">🏙️ 都市観光(🇰🇷/🇹🇼/🇭🇰/🇸🇬/🇺🇸等)</option>
                <option value="beach">🏖️ リゾート(🇹🇭/🇻🇳/🇵🇭/🇮🇩/🇺🇸等)</option>
                <option value="euro">🏛️ ヨーロッパ(🇫🇷/🇮🇹/🇪🇸/🇬🇧/🇵🇹等)</option>
                <option value="nature">🐨 大自然(🇦🇺等)</option>
            </select>
        </div>
        <button class="btn-reset" onclick="resetAll()">リストをリセット🔄</button>
    </div>

    <div id="todo-list"></div>
</div>

<script>
    const packingMaster = [
        {
            category: "✨ スタイル特化アイテム",
            isOverseas: true,
            items: [
                { 
                    name: "都市観光・ショッピング🏙️", style: "city", 
                    subs: [
                        { t: "大型サブバッグ", m: "💡帰りのお土産用" },
                        { t: "歩きやすいスニーカー", m: "💡1日2万歩歩くため" },
                        { t: "モバイルバッテリー2個", m: "💡マップと検索を多用するため" },
                        { t: "着圧ソックス", m: "💡足のむくみ対策" },
                        { t: "マスク", m: "💡交通機関や乾燥対策" },
                        { t: "現地決済アプリ設定", m: "💡スムーズな買い物のため" },
                        { t: "クレンジングサンプル", m: "💡現地で新しいコスメを試すため" }
                    ] 
                },
                { 
                    name: "ビーチリゾート・南国🏖️", style: "beach", 
                    subs: [
                        { t: "水着セット👙", m: "💡水着・ラッシュガード・ヌーブラ等" },
                        { t: "ビーチサンダル", m: "💡砂浜歩き・ホテル内移動用" },
                        { t: "防水スマホケース", m: "💡海中撮影・水濡れ防止" },
                        { t: "飲む日焼け止め", m: "💡内側からのUVケア" },
                        { t: "髪のUVカットスプレー", m: "💡海水のダメージ防止" },
                        { t: "虫除け/痒み止め", m: "💡デング熱等対策" },
                        { t: "強力冷房対策ストール", m: "💡建物内が非常に寒いため" },
                        { t: "流せるウェットティッシュ", m: "💡衛生面対策" },
                        { t: "捨ててもいい古タオル", m: "💡砂がついたものを拭く用" }
                    ] 
                },
                { 
                    name: "ヨーロッパ・歴史遺産巡り🏛️", style: "euro", 
                    subs: [
                        { t: "厚底スニーカー", m: "💡石畳での足裏の痛み防止" },
                        { t: "肩と膝を隠す服", m: "💡教会等への入場マナー" },
                        { t: "セキュリティポーチ", m: "💡服の下に隠せる貴重品入れ" },
                        { t: "カバン用小型南京錠", m: "💡スリ防止対策" },
                        { t: "チップ用の小銭入れ", m: "💡支払いをスムーズに" },
                        { t: "硬水対策ヘアオイル", m: "💡髪のバサバサ防止" },
                        { t: "レストラン用の服", m: "💡少し綺麗なワンピやシャツ" },
                        { t: "マルチ変換プラグ", m: "💡全世界対応1つあると安心" },
                        { t: "フリーズドライ日本食", m: "💡洋食に胃が疲れた時用" }
                    ] 
                },
                { 
                    name: "大自然・アクティビティ🐨", style: "nature", 
                    subs: [
                        { t: "ウィンドブレーカー", m: "💡朝夕の冷え込み対策" },
                        { t: "偏光サングラス", m: "💡強い日差しから目を守る" },
                        { t: "バックパック", m: "💡アクティブに動くため" },
                        { t: "絆創膏(予備)", m: "💡靴ズレ・小さな怪我用" },
                        { t: "水筒/タンブラー", m: "💡給水スポットが多いため" },
                        { t: "強力保湿バーム", m: "💡激しい乾燥対策" }
                    ] 
                }
            ]
        },
        {
            category: "💳 貴重品・ガジェット",
            items: [
                { name: "基本セット👛", subs: [{t:"財布・現金"}, {t:"身分証🪪"}, {t:"クレカ💳"}, {t:"予備財布"}] },
                { name: "ガジェット🔋", subs: [{t:"スマホ📱"}, {t:"充電器🔌"}, {t:"モバイルバッテリー🔋"}, {t:"イヤホン🎧"}] },
                { name: "海外必需品✈️", isOverseas: true, subs: [{t:"パスポート📕"}, {t:"パスポートコピー📄"}, {t:"Eチケット控え🎫"}, {t:"変換プラグ🔌"}] }
            ]
        },
        {
            category: "🧴 美容・ケア",
            items: [
                { name: "スキンケア✨", gender: "female", subs: [{t:"クレンジング🧼"}, {t:"洗顔🫧"}, {t:"化粧水・乳液🧴"}, {t:"美容液・クリーム"}, {t:"フェイスパック"}] },
                { name: "スキンケア✨", gender: "male", subs: [{t:"スクラブ洗顔🫧"}, {t:"オールインワンジェル🧴"}, {t:"日焼け止め"}, {t:"リップクリーム"}] },
                { name: "身だしなみ🪒", gender: "male", subs: [{t:"髭剃り🪒"}, {t:"シェービングジェル"}, {t:"ワックス💇‍♂️"}, {t:"鼻毛カッター"}] },
                { name: "メイク💄", gender: "female", subs: [{t:"下地・ファンデ🎨"}, {t:"アイブロウ✏️"}, {t:"アイシャドウ・チーク"}, {t:"リップ💄"}] },
                { name: "ヘアケア🛁", subs: [{t:"シャンプー類🧴"}, {t:"ヘアオイル✨"}, {t:"ヘアアイロン💇‍♀️"}, {t:"ヘアブラシ🪮"}] }
            ]
        },
        {
            category: "👗 衣類・日用品",
            items: [
                { name: "お洋服👕", hasQty: true, subs: [{t:"着替え（上下）👕"}, {t:"下着👙"}, {t:"靴下🧦"}, {t:"パジャマ🛌"}] },
                { name: "お役立ちアイテム👔", gender: "male", subs: [{t:"予備の白Tシャツ"}, {t:"ベルト👔"}, {t:"ランドリーバッグ"}] },
                { name: "衛生用品🩹", subs: [{t:"常備薬💊"}, {t:"正露丸/胃腸薬"}, {t:"絆創膏🩹"}, {t:"ウェットティッシュ🫧"}, {t:"ハンカチ🧼"}] }
            ]
        }
    ];

    let currentGender = localStorage.getItem('gender_v16') || 'female';
    let checkedItems = JSON.parse(localStorage.getItem('checked_v16') || '[]');
    let deletedSubs = JSON.parse(localStorage.getItem('deleted_subs_v16') || '[]');

    function setGender(gender) {
        currentGender = gender;
        localStorage.setItem('gender_v16', gender);
        document.getElementById('body').className = 'mode-' + gender;
        document.getElementById('btn-female').classList.toggle('active', gender === 'female');
        document.getElementById('btn-male').classList.toggle('active', gender === 'male');
        initList();
    }

    function toggleOverseas() {
        const isOverseas = document.getElementById('area').value === 'overseas';
        document.getElementById('style-div').style.display = isOverseas ? 'block' : 'none';
    }

    function initList() {
        const container = document.getElementById('todo-list');
        container.innerHTML = '';
        const area = document.getElementById('area').value;
        const currentStyle = document.getElementById('tripStyle').value;
        const nights = parseInt(document.getElementById('nights').value) || 0;

        packingMaster.forEach(cat => {
            if (cat.isOverseas && area === 'domestic') return;
            
            let itemsHtml = '';
            cat.items.forEach(item => {
                if (item.gender && item.gender !== currentGender) return;
                if (item.isOverseas && area === 'domestic') return;
                if (item.style && item.style !== currentStyle) return;

                const isChecked = checkedItems.includes(item.name);
                let subsHtml = '';

                item.subs.forEach(sub => {
                    const subId = `${item.name}_${sub.t}`;
                    if (deletedSubs.includes(subId)) return;

                    const isSubChecked = localStorage.getItem('sub_' + subId) === 'true';
                    subsHtml += `
                        <div class="sub-item ${isSubChecked ? 'sub-checked' : ''}">
                            <div class="sub-content" onclick="toggleSub('${subId}')">
                                <div class="sub-check"></div>
                                <div>
                                    <span>${sub.t}</span>
                                    ${sub.m ? `<span class="memo">${sub.m}</span>` : ''}
                                </div>
                            </div>
                            <button class="btn-del-sub" onclick="deleteSub(event, '${subId}')">🗑️</button>
                        </div>`;
                });

                const qtyText = item.hasQty ? ` <small style="color:var(--sub)">[${nights+1}点]</small>` : "";

                itemsHtml += `
                    <div class="item-row ${isChecked ? 'checked' : ''}">
                        <div class="item-main-flex">
                            <div class="item-main" onclick="toggleParent('${item.name}')">
                                <div class="check-box"></div>
                                <span class="item-label">${item.name}${qtyText}</span>
                            </div>
                        </div>
                        ${subsHtml ? `<div class="sub-container">${subsHtml}</div>` : ''}
                    </div>`;
            });

            if (itemsHtml) {
                container.innerHTML += `<div class="cat-title">${cat.category}</div>` + itemsHtml;
            }
        });
    }

    function toggleParent(name) {
        if (checkedItems.includes(name)) {
            checkedItems = checkedItems.filter(i => i !== name);
        } else {
            checkedItems.push(name);
        }
        save();
        initList();
    }

    function toggleSub(id) {
        const key = 'sub_' + id;
        const val = localStorage.getItem(key) === 'true';
        localStorage.setItem(key, !val);
        initList();
    }

    function deleteSub(event, id) {
        event.stopPropagation(); 
        if (confirm('この項目を削除しますか？')) {
            deletedSubs.push(id);
            save();
            initList();
        }
    }

    function resetAll() {
        if (confirm('すべてのチェックと削除をリセットしますか？')) {
            const genderBackup = currentGender;
            localStorage.clear();
            checkedItems = []; 
            deletedSubs = [];
            localStorage.setItem('gender_v16', genderBackup);
            setGender(genderBackup);
        }
    }

    function save() {
        localStorage.setItem('checked_v16', JSON.stringify(checkedItems));
        localStorage.setItem('deleted_subs_v16', JSON.stringify(deletedSubs));
    }

    window.addEventListener('DOMContentLoaded', () => {
        toggleOverseas();
        setGender(currentGender);
    });
</script>
</body>
</html>
