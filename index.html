<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Trip Packing вңЁ</title>
    <style>
        :root {
            --bg: #fff5f8;
            --main: #ff758c;
            --sub: #ff7eb3;
            --accent: #ffccd5;
            --text: #4a4a4a;
            --done-bg: #fdf2f4;
        }

        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Meiryo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 15px; margin: 0; line-height: 1.4;
        }

        .container {
            max-width: 550px; margin: 0 auto; background: white;
            border-radius: 35px; box-shadow: 0 10px 40px rgba(255, 117, 140, 0.2);
            padding: 20px; border: 4px solid #fff;
        }

        h1 { text-align: center; color: var(--main); font-size: 1.4rem; margin: 10px 0 20px; }

        /* иЁӯе®ҡгӮЁгғӘгӮў */
        .config {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
            background: #fffafa; padding: 18px; border-radius: 25px; border: 2px solid #ffe5ec;
        }
        .full { grid-column: span 2; }
        label { font-size: 0.75rem; font-weight: bold; color: var(--main); margin-bottom: 5px; display: block; }
        
        select, input {
            width: 100%; padding: 12px; border-radius: 15px; border: 1px solid #fce4ec; 
            margin-top: 4px; box-sizing: border-box; font-family: inherit; font-size: 0.9rem;
        }

        .btn-update {
            grid-column: span 2; background: linear-gradient(135deg, var(--main), var(--sub));
            color: white; border: none; padding: 14px; border-radius: 30px; 
            font-weight: bold; cursor: pointer; margin-top: 5px;
        }

        .add-custom { margin: 20px 0; display: flex; gap: 10px; }
        .add-custom input { flex: 1; margin: 0; background: #fff; }
        .btn-add { background: #ffb3c1; color: white; border: none; padding: 0 18px; border-radius: 15px; cursor: pointer; font-weight: bold; }

        .cat-title { font-size: 1rem; font-weight: bold; color: var(--main); margin: 25px 0 12px; border-left: 5px solid var(--main); padding-left: 10px; }

        /* гӮўгӮӨгғҶгғ иЎҢ */
        .item-row {
            background: #fff; border: 1.5px solid #fff0f3; padding: 12px 15px;
            border-radius: 20px; margin-bottom: 10px; transition: 0.3s;
        }

        .item-main-flex { display: flex; align-items: center; }
        .item-main { display: flex; align-items: center; cursor: pointer; flex: 1; font-size: 0.9rem; font-weight: bold; }
        .check-box { 
            width: 22px; height: 22px; border: 2px solid var(--accent); 
            border-radius: 50%; margin-right: 12px; flex-shrink: 0; position: relative;
        }
        
        .checked .check-box { background: var(--main); border-color: var(--main); }
        .checked .check-box::after { content: 'вң“'; color: white; position: absolute; left: 5px; top: -1px; font-weight: bold; }
        .checked .parent-label { text-decoration: line-through; color: #d0d0d0; }

        .btn-delete {
            background: none; border: none; color: #ffccd5; cursor: pointer; font-size: 1.1rem;
            padding: 5px; transition: 0.2s;
        }

        /* е°Ҹй …зӣ®пјҲгӮөгғ–гӮўгӮӨгғҶгғ пјү */
        .sub-container {
            margin: 10px 0 5px 34px; padding: 10px; background: #fffcfd; 
            border-radius: 15px; border: 1px dashed #ffd1dc;
        }
        .sub-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 0.85rem; cursor: pointer; }
        .sub-item:last-child { margin-bottom: 0; }
        .sub-check { width: 18px; height: 18px; border: 1.5px solid #ddd; border-radius: 5px; margin-right: 10px; background: white; }
        .sub-checked .sub-check { background: var(--sub); border-color: var(--sub); position: relative; }
        .sub-checked .sub-check::after { content: 'вң“'; color: white; font-size: 12px; position: absolute; left: 3px; top: -1px; }

        #done-section { margin-top: 40px; border-top: 3px dotted #ffe5ec; padding-top: 10px; }
        .item-row.checked { background: var(--done-bg); border-color: transparent; }
    </style>
</head>
<body>

<div class="container">
    <h1>рҹҺҖMy Packing List</h1>

    <div class="config">
        <div>
            <label>рҹҢҸгӮЁгғӘгӮў</label>
            <select id="area" onchange="toggleCountry(); initList();">
                <option value="domestic">еӣҪеҶ…ж—…иЎҢрҹҮҜрҹҮө</option>
                <option value="overseas">жө·еӨ–ж—…иЎҢвңҲпёҸ</option>
            </select>
        </div>
        <div id="country-div" style="display:none;">
            <label>рҹ“ҚиЎҢгҒҚе…Ҳ</label>
            <select id="country" onchange="initList()">
                <option value="general">рҹҢҚгҒқгҒ®д»–дёҖиҲ¬</option>
                <option value="usa">рҹҮәрҹҮёгӮўгғЎгғӘгӮ«/гғҒгғғгғ—еңҸ</option>
                <option value="korea">рҹҮ°рҹҮ·йҹ“еӣҪ</option>
                <option value="taiwan">рҹҮ№рҹҮјеҸ°ж№ҫ</option>
                <option value="thai">рҹҗҳгӮҝгӮӨ/жқұеҚ—гӮўгӮёгӮў</option>
                <option value="europe">рҹҸ°гғЁгғјгғӯгғғгғ‘</option>
            </select>
        </div>
        <div class="full">
            <label>рҹҢЎпёҸеӯЈзҜҖ</label>
            <select id="season" onchange="initList()">
                <option value="summer">вҳҖпёҸеӨҸпјҲжҡ‘гҒ„жҷӮжңҹпјү</option>
                <option value="winter">вқ„пёҸеҶ¬пјҲеҜ’гҒ„жҷӮжңҹпјү</option>
            </select>
        </div>
        <div class="full">
            <label>рҹҢҷе®ҝжіҠж•°</label>
            <input type="number" id="nights" value="1" onchange="initList()">
        </div>
        <button class="btn-update" onclick="resetAll()">е…ЁгғҒгӮ§гғғгӮҜи§ЈйҷӨрҹ”„</button>
    </div>

    <div class="add-custom">
        <input type="text" id="custom-input" placeholder="иҮӘеҲҶгҒ гҒ‘гҒ®жҢҒгҒЎзү©гӮ’иҝҪеҠ ...">
        <button class="btn-add" onclick="addCustomItem()">иҝҪеҠ </button>
    </div>

    <div id="todo-list"></div>
    
    <div id="done-section">
        <div class="cat-title">вң…жә–еӮҷгҒ§гҒҚгҒҹпјҒ</div>
        <div id="done-list"></div>
    </div>
</div>

<script>
    // гӮўгӮӨгғҶгғ гғҮгғјгӮҝж§ӢйҖ 
    const packingMaster = [
        {
            category: "рҹ’іиІҙйҮҚе“Ғгғ»йҮҚиҰҒжӣёйЎһ",
            id: "valuables",
            items: [
                { name: "еҹәжң¬гӮ»гғғгғҲрҹ‘ӣ", subs: ["иІЎеёғгғ»зҸҫйҮ‘рҹ‘ӣ", "иә«еҲҶиЁјрҹӘӘ", "гӮҜгғ¬гӮёгғғгғҲгӮ«гғјгғүрҹ’і", "дәҲеӮҷгҒ®иІЎеёғрҹ‘ӣ"] },
                { name: "гӮ¬гӮёгӮ§гғғгғҲрҹ”Ӣ", subs: ["гӮ№гғһгғӣрҹ“ұ", "е……йӣ»еҷЁрҹ”Ң", "гғўгғҗгӮӨгғ«гғҗгғғгғҶгғӘгғјрҹ”Ӣ", "еӨүжҸӣгғ—гғ©гӮ°рҹ”Ң"] },
                { name: "йҮҚиҰҒжӣёйЎһжҺ§рҹ“„", isOverseas: true, subs: ["гғ‘гӮ№гғқгғјгғҲрҹ“•", "гғ‘гӮ№гғқгғјгғҲгӮігғ”гғјрҹ“„", "иҲӘз©әеҲёдәҲзҙ„рҹҺ«", "жө·еӨ–ж—…иЎҢдҝқйҷәиЁјрҹҸҘ"] },
                { name: "гҒқгҒ®д»–ж—Ҙз”Ёе“ҒрҹӣҚпёҸ", subs: ["гӮЁгӮігғҗгғғгӮ°рҹӣҚпёҸ", "гғЎгӮ¬гғҚгғ»гӮігғігӮҝгӮҜгғҲрҹ‘“", "зӯҶиЁҳз”Ёе…·рҹ–ҠпёҸ", "жҠҳгӮҠгҒҹгҒҹгҒҝеӮҳвӣұпёҸ"] }
            ]
        },
        {
            category: "рҹ§ҙзҫҺе®№гғ»гғҗгӮ№з”Ёе“Ғ",
            id: "beauty",
            items: [
                { name: "гӮ№гӮӯгғігӮұгӮўвңЁ", subs: ["гӮҜгғ¬гғігӮёгғігӮ°рҹ§ј", "жҙ—йЎ”рҹ«§", "е°Һе…Ҙж¶ІвңЁ", "еҢ–зІ§ж°ҙрҹ’§", "д№іж¶Ірҹ§ҙ", "зҫҺе®№ж¶ІвңЁ", "гӮҜгғӘгғјгғ рҹ§ҙ", "гӮўгӮӨгӮҜгғӘгғјгғ рҹ‘Җ", "гғ•гӮ§гӮӨгӮ№гғ‘гғғгӮҜрҹҺӯ"] },
                { name: "гғҗгӮ№гғ»гғңгғҮгӮЈгӮұгӮўрҹӣҒ", subs: ["гӮ·гғЈгғігғ—гғјрҹ§ҙ", "гғҲгғӘгғјгғҲгғЎгғігғҲрҹ§ҙ", "гғҳгӮўгӮӘгӮӨгғ«вңЁ", "гғңгғҮгӮЈгӮҜгғӘгғјгғ рҹ§ҙ", "е…ҘжөҙеүӨрҹӣҒ", "жҙ—йЎ”гӮҝгғјгғҗгғірҹҺҖ"] },
                { name: "гғЎгӮӨгӮҜрҹ’„", subs: ["дёӢең°рҹ’„", "гғ•гӮЎгғігғҮрҹҺЁ", "гғ‘гӮҰгғҖгғјвңЁ", "гӮўгӮӨгғ–гғӯгӮҰвңҸпёҸ", "гӮўгӮӨгӮ·гғЈгғүгӮҰрҹҺЁ", "гӮўгӮӨгғ©гӮӨгғҠгғјрҹ‘ҒпёҸ", "гғһгӮ№гӮ«гғ©рҹ‘ҒпёҸ", "гғ“гғҘгғјгғ©гғјрҹ‘Җ", "гғҒгғјгӮҜрҹҳҠ", "гғӘгғғгғ—рҹ’„"] },
                { name: "гғҳгӮўгғ»йҸЎрҹ’ҮвҖҚвҷҖпёҸ", subs: ["гғҳгӮўгӮўгӮӨгғӯгғірҹ’ҮвҖҚвҷҖпёҸ", "гғҳгӮўгғ–гғ©гӮ·рҹӘ®", "гғҳгӮўгӮҙгғ гғ»гғ”гғірҹҺҖ", "еҚ“дёҠгғҹгғ©гғјрҹӘһ"] }
            ]
        },
        {
            category: "рҹ‘—иЎЈйЎһгғ»ж—Ҙз”Ёе“Ғ",
            id: "clothing",
            items: [
                { name: "гҒҠжҙӢжңҚрҹ‘•", hasQty: true, subs: ["зқҖжӣҝгҒҲрҹ‘•", "дёӢзқҖрҹ‘ҷ", "йқҙдёӢгғ»гӮҝгӮӨгғ„рҹ§Ұ"] },
                { name: "гҒҠгӮ„гҒҷгҒҝгғ»гӮұгӮўрҹӣҢ", subs: ["гғ‘гӮёгғЈгғһрҹӣҢ", "зқҖең§гӮҪгғғгӮҜгӮ№рҹ§Ұ", "е®ӨеҶ…гӮ№гғӘгғғгғ‘рҹ‘ҹ"] },
                { name: "иЎӣз”ҹз”Ёе“Ғрҹ©№", subs: ["гғҸгғігӮ«гғҒрҹ§ј", "гӮҰгӮ§гғғгғҲгғҶгӮЈгғғгӮ·гғҘрҹ«§", "еёёеӮҷи–¬рҹ’Ҡ", "з”ҹзҗҶгғҠгғ—гӮӯгғірҹҺҖ", "зөҶеүөиҶҸрҹ©№", "йҷӨиҸҢгӮёгӮ§гғ«рҹ«§"] }
            ]
        },
        {
            category: "рҹ“Қең°еҹҹгғ»еӯЈзҜҖзү№еҢ–",
            id: "special",
            items: [
                { name: "еӨҸйҷҗе®ҡвҳҖпёҸ", isSummer: true, subs: ["ж—ҘеӮҳвӣұпёҸ", "ж—Ҙз„јгҒ‘жӯўгӮҒрҹ§ҙ", "гӮөгғігӮ°гғ©гӮ№рҹ•¶пёҸ", "гғ•гӮЎгғірҹҢҖ", "жұ—жӢӯгҒҚгӮ·гғјгғҲрҹ§Ҡ"] },
                { name: "еҶ¬йҷҗе®ҡвқ„пёҸ", isWinter: true, subs: ["гӮ«гӮӨгғӯвҷЁпёҸ", "гғһгғ•гғ©гғјрҹ§Ј", "жүӢиўӢрҹ§Ө", "дҝқж№ҝгғҗгғјгғ рҹҚҜ"] },
                { name: "йҹ“еӣҪгҒҠеҪ№з«ӢгҒЎрҹҮ°рҹҮ·", target: "korea", subs: ["WOWPASSрҹ’і", "зҫҺжҙ»з”ЁдҝқеҶ·гғҗгғғгӮ°вқ„пёҸ"] },
                { name: "гӮҝгӮӨ/жқұеҚ—гӮўгӮёгӮўрҹҗҳ", target: "thai", subs: ["еј·еҠӣиҷ«йҷӨгҒ‘рҹҰҹ", "гҒӢгӮҶгҒҝжӯўгӮҒрҹ©№", "еүІгӮҠз®ёрҹҘў"] },
                { name: "гӮўгғЎгғӘгӮ«/ж¬§е·һрҹ’¶", target: ["usa", "europe"], subs: ["гғҒгғғгғ—з”Ёе°ҸйҠӯрҹ’ө", "йҳІзҠҜгғҗгғғгӮ°рҹ”’", "жӯ©гҒҚгӮ„гҒҷгҒ„йқҙрҹ‘ҹ"] }
            ]
        }
    ];

    let customItems = JSON.parse(localStorage.getItem('my_custom_v9') || '[]');
    let checkedItems = JSON.parse(localStorage.getItem('my_checked_v9') || '[]');
    let deletedItems = JSON.parse(localStorage.getItem('my_deleted_v9') || '[]');

    function toggleCountry() {
        document.getElementById('country-div').style.display = (document.getElementById('area').value === 'overseas') ? 'block' : 'none';
    }

    function initList() {
        const todoContainer = document.getElementById('todo-list');
        const doneContainer = document.getElementById('done-list');
        todoContainer.innerHTML = '';
        doneContainer.innerHTML = '';

        const area = document.getElementById('area').value;
        const country = document.getElementById('country').value;
        const season = document.getElementById('season').value;
        const nights = parseInt(document.getElementById('nights').value);

        packingMaster.forEach(cat => {
            const catHeader = document.createElement('div');
            catHeader.className = 'cat-title';
            catHeader.innerText = cat.category;
            let catHasItem = false;

            cat.items.forEach(item => {
                // жқЎд»¶гғ•гӮЈгғ«гӮҝгғӘгғігӮ°
                if (item.isOverseas && area === 'domestic') return;
                if (item.isSummer && season === 'winter') return;
                if (item.isWinter && season === 'summer') return;
                if (item.target && !Array.isArray(item.target) && item.target !== country) return;
                if (item.target && Array.isArray(item.target) && !item.target.includes(country)) return;
                if (deletedItems.includes(item.name)) return;

                if (!catHasItem) { todoContainer.appendChild(catHeader); catHasItem = true; }
                renderParentItem(item, nights);
            });
        });

        // гҒҳгҒ¶гӮ“гғӘгӮ№гғҲ
        if (customItems.length > 0) {
            const customHeader = document.createElement('div');
            customHeader.className = 'cat-title';
            customHeader.innerText = "рҹ§ёгҒҳгҒ¶гӮ“гғӘгӮ№гғҲ";
            todoContainer.appendChild(customHeader);
            customItems.forEach(name => {
                if (!deletedItems.includes(name)) renderParentItem({name: name, subs: []}, 0);
            });
        }
    }

    function renderParentItem(item, nights) {
        const isChecked = checkedItems.includes(item.name);
        const div = document.createElement('div');
        div.className = `item-row ${isChecked ? 'checked' : ''}`;

        let subHtml = "";
        if (item.subs.length > 0) {
            subHtml = `<div class="sub-container">`;
            item.subs.forEach(sub => {
                const subKey = `sub_${item.name}_${sub}`;
                const isSubChecked = localStorage.getItem(subKey) === 'true';
                subHtml += `
                    <div class="sub-item ${isSubChecked ? 'sub-checked' : ''}" onclick="event.stopPropagation(); toggleSub(this, '${subKey}')">
                        <div class="sub-check"></div>${sub}
                    </div>`;
            });
            subHtml += `</div>`;
        }

        const qtyText = item.hasQty ? `<small style="color:var(--main)"> [${nights+1}жһҡ]</small>` : "";

        div.innerHTML = `
            <div class="item-main-flex">
                <div class="item-main" onclick="toggleParent('${item.name}')">
                    <div class="check-box"></div>
                    <span class="parent-label">${item.name}${qtyText}</span>
                </div>
                <button class="btn-delete" onclick="deleteItem('${item.name}')">рҹ—‘пёҸ</button>
            </div>
            ${subHtml}
        `;

        if (isChecked) {
            document.getElementById('done-list').appendChild(div);
        } else {
            document.getElementById('todo-list').appendChild(div);
        }
    }

    function toggleParent(name) {
        if (checkedItems.includes(name)) {
            checkedItems = checkedItems.filter(i => i !== name);
        } else {
            checkedItems.push(name);
        }
        save();
        initList();
    }

    function toggleSub(el, key) {
        const isNowChecked = el.classList.toggle('sub-checked');
        localStorage.setItem(key, isNowChecked);
    }

    function deleteItem(name) {
        if (confirm(`${name}гӮ’йқһиЎЁзӨәгҒ«гҒ—гҒҫгҒҷгҒӢпјҹ`)) {
            deletedItems.push(name);
            save();
            initList();
        }
    }

    function addCustomItem() {
        const input = document.getElementById('custom-input');
        if (input.value.trim()) {
            customItems.push(input.value.trim() + "рҹҸ·пёҸ");
            save();
            input.value = '';
            initList();
        }
    }

    function resetAll() {
        if (confirm("е…ЁгҒҰгҒ®гғҒгӮ§гғғгӮҜгӮ’и§ЈйҷӨгҒ—гҒҫгҒҷгҒӢпјҹ")) {
            checkedItems = [];
            localStorage.clear(); // гӮөгғ–й …зӣ®гҒ®гғҒгӮ§гғғгӮҜгӮӮж¶ҲеҺ»
            save();
            initList();
        }
    }

    function save() {
        localStorage.setItem('my_custom_v9', JSON.stringify(customItems));
        localStorage.setItem('my_checked_v9', JSON.stringify(checkedItems));
        localStorage.setItem('my_deleted_v9', JSON.stringify(deletedItems));
    }

    window.onload = () => {
        toggleCountry();
        initList();
    };
</script>
</body>
</html>
