<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Trip Packing ✨</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    :root {
      --bg-female:#faf7f2;--main-female:#d1b799;--sub-female:#b5a18d;--accent-female:#eaddcf;--text-female:#5c544e;--done-female:#f2f0ed;
      --bg-male:#f0f2f5;--main-male:#6789a4;--sub-male:#4a6375;--accent-male:#cbd5e0;--text-male:#2d3748;--done-male:#e2e8f0;
    }
    body.mode-female{--bg:var(--bg-female);--main:var(--main-female);--sub:var(--sub-female);--accent:var(--accent-female);--text:var(--text-female);--done-bg:var(--done-female);}
    body.mode-male{--bg:var(--bg-male);--main:var(--main-male);--sub:var(--sub-male);--accent:var(--accent-male);--text:var(--text-male);--done-bg:var(--done-male);}
    *{box-sizing:border-box;}
    body{font-family:'Hiragino Maru Gothic ProN','Meiryo',sans-serif;background:var(--bg);color:var(--text);margin:0;padding:52px 15px 20px;line-height:1.4;transition:background .3s;}

    /* ── Fixed top bar ── */
    #top-bar{position:fixed;top:0;left:0;right:0;z-index:1000;background:white;border-bottom:1px solid var(--accent);padding:7px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
    #progress-bar-wrap{flex:1;background:var(--accent);border-radius:10px;height:8px;overflow:hidden;}
    #progress-fill{height:100%;background:var(--main);border-radius:10px;transition:width .4s ease;width:0%;}
    #progress-text{font-size:.7rem;color:var(--sub);white-space:nowrap;font-weight:bold;}
    #countdown-text{font-size:.72rem;color:var(--main);white-space:nowrap;font-weight:bold;}

    /* ── Container ── */
    .container{max-width:550px;margin:0 auto;background:white;border-radius:30px;box-shadow:0 10px 30px rgba(0,0,0,.05);padding:20px;border:1px solid rgba(0,0,0,.02);}
    h1{text-align:center;color:var(--main);font-size:1.3rem;margin:10px 0 15px;letter-spacing:1px;}

    /* ── Gender switch ── */
    .gender-switch{display:flex;justify-content:center;gap:10px;margin-bottom:20px;}
    .gender-btn{flex:1;background:#fff;border:2px solid var(--accent);color:var(--sub);padding:12px;border-radius:15px;cursor:pointer;font-weight:bold;transition:.3s;font-size:.9rem;outline:none;}
    .gender-btn.active{background:var(--main);border-color:var(--main);color:white;}

    /* ── Config ── */
    .config{display:grid;grid-template-columns:1fr 1fr;gap:12px;background:#fdfcfb;padding:18px;border-radius:20px;border:1px solid #f0ede9;}
    .full{grid-column:span 2;}
    label{font-size:.75rem;font-weight:bold;color:var(--sub);margin-bottom:4px;display:block;}
    select,input[type=number],input[type=date]{width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--accent);font-family:inherit;font-size:.9rem;background:white;color:var(--text);}
    .btn-reset{grid-column:span 2;background:none;color:var(--sub);border:1px solid var(--accent);padding:10px;border-radius:15px;font-size:.8rem;cursor:pointer;margin-top:5px;}

    /* ── Country info ── */
    #country-info{margin-top:15px;padding:15px;background:#fff;border-radius:15px;border:2px solid var(--accent);display:none;}
    #country-info h3{margin:0 0 8px;font-size:.9rem;color:var(--main);border-bottom:1px dashed var(--accent);padding-bottom:5px;}
    #country-info p{margin:4px 0;font-size:.75rem;line-height:1.6;}
    .temp-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:bold;margin-left:6px;}
    .temp-cold{background:#e3f0ff;color:#1565c0;}
    .temp-cool{background:#e8f5e9;color:#2e7d32;}
    .temp-mild{background:#fff8e1;color:#f57f17;}
    .temp-hot{background:#fce4ec;color:#c62828;}
    .ng-section{margin-top:10px;padding:10px 12px;background:#fff5f5;border-radius:10px;border:1px solid #ffd0d0;}
    .ng-title{font-size:.75rem;font-weight:bold;color:#c62828;margin-bottom:5px;}
    .ng-item{font-size:.72rem;color:#555;line-height:1.7;}
    .rate-link{display:inline-block;margin-top:8px;padding:5px 12px;background:var(--main);color:white;border-radius:20px;text-decoration:none;font-size:.7rem;font-weight:bold;}

    /* ── Scene filter ── */
    #scene-section{margin-top:18px;padding:14px;background:#fdfcfb;border-radius:16px;border:1px solid #f0ede9;display:none;}
    .scene-section-label{font-size:.75rem;font-weight:bold;color:var(--sub);margin-bottom:10px;display:block;}
    .scene-chips{display:flex;flex-wrap:wrap;gap:8px;}
    .scene-chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--accent);font-size:.78rem;font-weight:bold;color:var(--sub);background:white;cursor:pointer;transition:.2s;}
    .scene-chip.active{background:var(--main);border-color:var(--main);color:white;}
    .scene-chip.suggested{border-color:var(--main);color:var(--main);}
    .scene-chip.suggested::after{content:' ★';font-size:.65rem;}

    /* ── Category ── */
    .cat-title{font-size:.95rem;font-weight:bold;color:var(--sub);margin:25px 0 12px;border-left:4px solid var(--main);padding-left:10px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;}
    .cat-toggle{font-size:.7rem;transition:transform .2s;margin-left:6px;}
    .cat-title.collapsed .cat-toggle{transform:rotate(-90deg);}
    .cat-body.hidden{display:none;}

    /* ── Item rows ── */
    .item-row{background:#fff;border:1px solid #f0ede9;padding:12px 15px;border-radius:18px;margin-bottom:10px;transition:.3s ease;}
    .item-row.checked{background:var(--done-bg);border-color:transparent;opacity:.5;}
    .item-row.flagged{border-left:3px solid #f59e0b;background:#fffbf0;}
    .item-row.flagged.checked{opacity:.45;}
    .item-header{display:flex;align-items:center;justify-content:space-between;}
    .item-main{display:flex;align-items:center;cursor:pointer;flex:1;font-weight:bold;font-size:.9rem;}
    .check-box{width:20px;height:20px;border:2px solid var(--accent);border-radius:50%;margin-right:12px;position:relative;flex-shrink:0;background:white;transition:.2s;}
    .checked .check-box{background:var(--main);border-color:var(--main);}
    .checked .check-box::after{content:'✓';color:white;position:absolute;left:4px;top:-1px;font-weight:bold;}
    .checked .item-label{text-decoration:line-through;color:#b5b5b5;}
    .btn-flag{background:none;border:none;cursor:pointer;font-size:.85rem;padding:5px;opacity:.25;transition:opacity .2s;line-height:1;}
    .btn-flag:hover{opacity:.8;}
    .flagged .btn-flag{opacity:1;}
    .btn-del-custom{background:none;border:none;cursor:pointer;font-size:.8rem;padding:5px;color:#ddd;line-height:1;}
    .btn-del-custom:hover{color:#f87171;}

    /* ── Sub items ── */
    .sub-container{margin:10px 0 0 32px;padding:8px;background:rgba(0,0,0,.02);border-radius:12px;border:1px dashed var(--accent);}
    .sub-item{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:.8rem;}
    .sub-content{display:flex;align-items:flex-start;cursor:pointer;flex:1;}
    .sub-check{width:16px;height:16px;border:1.5px solid var(--accent);border-radius:4px;margin-right:8px;background:white;position:relative;flex-shrink:0;margin-top:2px;}
    .sub-checked .sub-check{background:var(--sub);border-color:var(--sub);}
    .sub-checked .sub-check::after{content:'✓';color:white;font-size:10px;position:absolute;left:2px;top:-1px;}
    .sub-checked span{text-decoration:line-through;color:#b5b5b5;}
    .memo{display:block;font-size:.7rem;color:#999;margin-top:2px;line-height:1.2;font-weight:normal;}
    .btn-del-sub{background:none;border:none;color:#dcd6d0;cursor:pointer;font-size:.9rem;padding:5px;}

    /* ── Done & flagged sections ── */
    #done-section{margin-top:30px;border-top:2px dashed var(--accent);padding-top:20px;}
    .done-header{text-align:center;font-size:.8rem;color:var(--sub);font-weight:bold;margin-bottom:15px;}
    #flagged-section{margin-top:20px;padding:14px;background:#fffbf0;border-radius:16px;border:1px dashed #f59e0b;display:none;}
    .flagged-header{font-size:.8rem;font-weight:bold;color:#d97706;margin-bottom:10px;}

    /* ── Add custom item ── */
    .add-item-wrap{margin-top:20px;}
    .add-form{display:none;background:#fafafa;border-radius:15px;padding:15px;border:1px solid var(--accent);margin-bottom:10px;}
    .add-form.visible{display:block;}
    .add-form input[type=text]{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--accent);font-family:inherit;font-size:.85rem;color:var(--text);background:white;margin-bottom:8px;}
    .btn-add-confirm{background:var(--main);color:white;border:none;padding:10px 20px;border-radius:12px;font-family:inherit;font-size:.85rem;font-weight:bold;cursor:pointer;}
    .btn-add-cancel{background:none;color:var(--sub);border:1px solid var(--accent);padding:10px 20px;border-radius:12px;font-family:inherit;font-size:.85rem;cursor:pointer;margin-left:8px;}
    .btn-add-open{width:100%;background:none;border:2px dashed var(--accent);color:var(--sub);padding:12px;border-radius:15px;font-family:inherit;font-size:.85rem;cursor:pointer;font-weight:bold;transition:.2s;}
    .btn-add-open:hover{border-color:var(--main);color:var(--main);}

    /* ── Action buttons ── */
    .action-buttons{display:flex;gap:10px;margin-top:20px;}
    .btn-action{flex:1;padding:12px;border-radius:15px;border:1px solid var(--accent);background:white;color:var(--sub);font-family:inherit;font-size:.8rem;font-weight:bold;cursor:pointer;transition:.2s;}
    .btn-action:hover{background:var(--accent);}
    .btn-action.primary{background:var(--main);color:white;border-color:var(--main);}
    .btn-action.primary:hover{opacity:.85;}

    /* ── Print ── */
    @media print{
      body{padding-top:0!important;background:white!important;}
      #top-bar,.gender-switch,.action-buttons,.add-item-wrap,#scene-section,.btn-flag,.btn-del-sub,.btn-del-custom,.btn-reset,.no-print{display:none!important;}
      .container{box-shadow:none!important;border:none!important;border-radius:0!important;max-width:100%!important;padding:0!important;}
      .item-row.checked{opacity:1!important;background:#f5f5f5!important;}
      .cat-body.hidden{display:block!important;}
    }
  </style>
</head>
<body id="body" class="mode-female">

<!-- Fixed top info bar -->
<div id="top-bar">
  <div id="progress-bar-wrap">
    <div id="progress-fill"></div>
  </div>
  <span id="progress-text">0/0</span>
  <span id="countdown-text"></span>
</div>

<div class="container" id="main-content">
  <h1>🧺 My Packing List</h1>

  <div class="gender-switch">
    <button id="btn-female" class="gender-btn" onclick="setGender('female')">👩 女性向け</button>
    <button id="btn-male" class="gender-btn" onclick="setGender('male')">👨 男性向け</button>
  </div>

  <div class="config">
    <div>
      <label>🌏 エリア</label>
      <select id="area" onchange="saveConfig();toggleOverseas();initList();">
        <option value="domestic">国内旅行🇯🇵</option>
        <option value="overseas">海外旅行✈️</option>
      </select>
    </div>
    <div>
      <label>🌙 宿泊数</label>
      <input type="number" id="nights" value="1" min="0" onchange="saveConfig();initList()">
    </div>
    <div>
      <label>📅 出発月</label>
      <select id="travelMonth" onchange="saveConfig();updateCountryInfo();">
        <option value="">-- 月を選択 --</option>
        <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
        <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
        <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
        <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
      </select>
    </div>
    <div>
      <label>✈️ 出発日</label>
      <input type="date" id="departDate" onchange="saveConfig();updateCountdown();">
    </div>
    <div id="style-div" class="full" style="display:none;">
      <label>📍 渡航先セレクト</label>
      <select id="tripStyle" onchange="saveConfig();updateCountryInfo();updateSuggestedScenes();initList();">
        <option value="none">--- 選択してください ---</option>
        <optgroup label="■ 東アジア">
          <option value="korea">韓国 🇰🇷</option>
          <option value="taiwan">台湾 🇹🇼</option>
          <option value="hongkong">香港 🇭🇰</option>
        </optgroup>
        <optgroup label="■ 東南アジア">
          <option value="thailand">タイ 🇹🇭</option>
          <option value="vietnam">ベトナム 🇻🇳</option>
          <option value="philippines">フィリピン 🇵🇭</option>
          <option value="singapore">シンガポール 🇸🇬</option>
          <option value="malaysia">マレーシア 🇲🇾</option>
          <option value="indonesia">インドネシア(バリ) 🇮🇩</option>
        </optgroup>
        <optgroup label="■ 北米・ハワイ">
          <option value="usa">アメリカ・ハワイ 🇺🇸</option>
          <option value="guam">グアム 🇬🇺</option>
        </optgroup>
        <optgroup label="■ ヨーロッパ">
          <option value="france">フランス 🇫🇷</option>
          <option value="italy">イタリア 🇮🇹</option>
          <option value="uk">イギリス 🇬🇧</option>
          <option value="spain">スペイン 🇪🇸</option>
          <option value="portugal">ポルトガル 🇵🇹</option>
          <option value="germany">ドイツ 🇩🇪</option>
          <option value="swiss">スイス 🇨🇭</option>
        </optgroup>
        <optgroup label="■ オセアニア">
          <option value="australia">オーストラリア 🇦🇺</option>
          <option value="nz">ニュージーランド 🇳🇿</option>
        </optgroup>
        <option value="other">その他・他国</option>
      </select>
      <div id="country-info"></div>
    </div>
    <button class="btn-reset no-print" onclick="resetAll()">リストをリセット🔄</button>
  </div>

  <!-- Scene filter (overseas only) -->
  <div id="scene-section" class="no-print">
    <span class="scene-section-label">🎯 旅のシーンで絞り込む（複数選択可）<br><small style="font-weight:normal;color:#bbb;">★ = この国におすすめ</small></span>
    <div class="scene-chips">
      <button class="scene-chip" data-scene="sightseeing" onclick="toggleScene('sightseeing')">🗼 観光メイン</button>
      <button class="scene-chip" data-scene="beach"       onclick="toggleScene('beach')">🏖️ ビーチ</button>
      <button class="scene-chip" data-scene="business"    onclick="toggleScene('business')">💼 ビジネス</button>
      <button class="scene-chip" data-scene="outdoor"     onclick="toggleScene('outdoor')">🏔️ アウトドア</button>
      <button class="scene-chip" data-scene="gourmet"     onclick="toggleScene('gourmet')">🍽️ グルメ</button>
    </div>
  </div>

  <div id="todo-list"></div>

  <!-- Add custom item -->
  <div class="add-item-wrap no-print">
    <div class="add-form" id="add-form">
      <label>📝 アイテム名</label>
      <input type="text" id="custom-name" placeholder="例：水着、変換プラグ…">
      <label style="margin-top:6px;">💬 メモ（任意）</label>
      <input type="text" id="custom-memo" placeholder="例：コンビニで買う、Mサイズ">
      <div style="margin-top:10px;">
        <button class="btn-add-confirm" onclick="addCustomItem()">＋ 追加する</button>
        <button class="btn-add-cancel" onclick="hideAddForm()">キャンセル</button>
      </div>
    </div>
    <button class="btn-add-open" id="btn-add-open" onclick="showAddForm()">＋ カスタムアイテムを追加する</button>
  </div>

  <div id="done-section" style="display:none;">
    <div class="done-header">── 準備完了（CHECKED） ──</div>
    <div id="done-list"></div>
  </div>

  <div class="action-buttons no-print">
    <button class="btn-action" onclick="window.print()">🖨️ 印刷</button>
    <button class="btn-action primary" onclick="exportPDF()">📄 PDF保存</button>
  </div>
</div>

function getTempInfo(temp) {
  if (temp <= 5)  return {cls:'temp-cold', label:`${temp}°C ❄️ 極寒`, advice:'厚手コート・手袋・マフラー必須。重ね着推奨。'};
  if (temp <= 12) return {cls:'temp-cold', label:`${temp}°C 🧥 寒い`, advice:'薄手ダウンや重ね着が有効。防寒を意識して。'};
  if (temp <= 20) return {cls:'temp-cool', label:`${temp}°C 🌤️ 快適`, advice:'過ごしやすい気候。薄手の羽織ものを一枚。'};
  if (temp <= 27) return {cls:'temp-mild', label:`${temp}°C ☀️ 暖かい`, advice:'半袖がちょうどいい。日焼け止めも持参を。'};
  return          {cls:'temp-hot',  label:`${temp}°C 🔥 酷暑！`, advice:'熱中症・脱水に注意。経口補水液や冷却グッズを。'};
}

function updateCountryInfo() {
  const style = document.getElementById('tripStyle').value;
  const month = parseInt(document.getElementById('travelMonth').value) || 0;
  const infoBox = document.getElementById('country-info');
  const area = document.getElementById('area').value;

  if (area !== 'overseas' || !countryData[style]) {
    infoBox.style.display = 'none'; return;
  }
  const d = countryData[style];
  const countryName = document.getElementById('tripStyle').selectedOptions[0].text;

  // Temperature
  let tempHtml = '';
  if (d.tempByMonth && month) {
    const t = getTempInfo(d.tempByMonth[month - 1]);
    tempHtml = `<p>🌡️ <b>${month}月の平均気温：</b><span class="temp-badge ${t.cls}">${t.label}</span></p>
                <p style="color:#777;font-size:.72rem;margin-left:6px;">👉 ${t.advice}</p>`;
  } else if (d.tempByMonth) {
    tempHtml = `<p style="color:#bbb;font-size:.72rem;">💡 出発月を選択すると気温情報が表示されます。</p>`;
  }

  // NG items
  const ngHtml = `<div class="ng-section">
    <div class="ng-title">⛔ 持込NG・要注意アイテム</div>
    ${d.ngItems.map(n=>`<div class="ng-item">・${n.t}<span style="color:#aaa;"> — ${n.m}</span></div>`).join('')}
  </div>`;

  infoBox.style.display = 'block';
  infoBox.innerHTML = `
    <h3>📍 ${countryName} 情報</h3>
    <p>💰 <b>通貨：</b>${d.currency} | 🛎️ <b>チップ：</b>${d.tip}</p>
    ${tempHtml}
    <p>💡 <b>アドバイス：</b>${d.memo}</p>
    ${ngHtml}
    <a href="https://www.google.com/search?q=${encodeURIComponent(d.currency)}+レート+本日" target="_blank" class="rate-link">📊 最新レートを確認する</a>`;
}

function updateSuggestedScenes() {
  const style = document.getElementById('tripStyle').value;
  const suggested = countryData[style]?.suggestedScenes || [];
  document.querySelectorAll('.scene-chip').forEach(btn => {
    const s = btn.dataset.scene;
    btn.classList.toggle('suggested', !btn.classList.contains('active') && suggested.includes(s));
  });
}

function updateCountdown() {
  const val = document.getElementById('departDate').value;
  const el = document.getElementById('countdown-text');
  if (!val) { el.textContent = ''; return; }
  const today = new Date(); today.setHours(0,0,0,0);
  const depart = new Date(val);
  const diff = Math.round((depart - today) / 86400000);
  if (diff < 0)       el.textContent = '';
  else if (diff === 0) el.textContent = '✈️ 今日出発！';
  else if (diff === 1) el.textContent = '✈️ 明日出発！';
  else                 el.textContent = `✈️ 出発まであと ${diff} 日`;
}

function updateProgress() {
  const total = document.querySelectorAll('#todo-list .item-row:not(.custom-placeholder), #done-list .item-row').length +
                document.querySelectorAll('#todo-list .item-row').length;
  const done  = document.querySelectorAll('#done-list .item-row').length;
  const all   = done + document.querySelectorAll('#todo-list .item-row').length;
  const pct   = all > 0 ? Math.round(done / all * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${done}/${all} ✓`;
}

function toggleScene(scene) {
  const idx = selectedScenes.indexOf(scene);
  if (idx >= 0) selectedScenes.splice(idx, 1);
  else selectedScenes.push(scene);
  saveAll();
  document.querySelectorAll('.scene-chip').forEach(btn => {
    const s = btn.dataset.scene;
    btn.classList.toggle('active', selectedScenes.includes(s));
    if (selectedScenes.includes(s)) btn.classList.remove('suggested');
  });
  updateSuggestedScenes();
  initList();
}

function toggleCat(id) {
  const idx = collapsedCats.indexOf(id);
  if (idx >= 0) collapsedCats.splice(idx, 1);
  else collapsedCats.push(id);
  saveAll();
  const title = document.querySelector(`.cat-title[data-cat="${CSS.escape(id)}"]`);
  const body  = title?.nextElementSibling;
  if (title && body) {
    title.classList.toggle('collapsed', collapsedCats.includes(id));
    body.classList.toggle('hidden', collapsedCats.includes(id));
  }
}

function renderItem(item, nights, source) {

  const isCustom  = source === 'custom';

  let subsHtml = '';
  if (item.subs) {
    item.subs.forEach(sub => {
      const subId = `${item.name}_${sub.t}`;
      if (deletedSubs.includes(subId)) return;
      const isSubChecked = localStorage.getItem('sub_' + subId) === 'true';
      subsHtml += `<div class="sub-item ${isSubChecked ? 'sub-checked' : ''}">
        <div class="sub-content" onclick="toggleSub('${subId.replace(/'/g,"\\'")}')">
          <div class="sub-check"></div>
          <div><span>${sub.t}</span>${sub.m ? `<span class="memo">${sub.m}</span>` : ''}</div>
        </div>
        ${!isCustom ? `<button class="btn-del-sub" onclick="deleteSub(event,'${subId.replace(/'/g,"\\'")}')">🗑️</button>` : ''}
      </div>`;
    });
  }

  const qtyText = item.hasQty ? ` <small>[${nights+1}点]</small>` : '';
  const safeN = item.name.replace(/'/g, "\\'");
  return `<div class="item-row ${isChecked?'checked':''} ${isFlagged?'flagged':''}">
    <div class="item-header">
      <div class="item-main" onclick="toggleParent('${safeN}')">
        <div class="check-box"></div>
        <span class="item-label">${item.name}${qtyText}</span>
      </div>
      <div style="display:flex;gap:2px;">
        <button class="btn-flag" onclick="toggleFlag(event,'${safeN}')" title="あとで確認">🔖</button>
        ${isCustom ? `<button class="btn-del-custom" onclick="deleteCustomItem(event,'${safeN}')">✕</button>` : ''}
      </div>
    </div>
    ${subsHtml ? `<div class="sub-container">${subsHtml}</div>` : ''}
  </div>`;
}

function renderCategory(cat, items, nights, source) {
  const collapsed = collapsedCats.includes(cat);
  const safeCat = cat.replace(/"/g, '&quot;');
  const itemsHtml = items.map(i => renderItem(i, nights, source)).join('');
  return `<div class="cat-title ${collapsed?'collapsed':''}" data-cat="${safeCat}" onclick="toggleCat('${safeCat.replace(/'/g,"\\'")}')">
    <span>${cat}</span><span class="cat-toggle">▼</span>
  </div>
  <div class="cat-body ${collapsed?'hidden':''}">${itemsHtml}</div>`;
}

function initList() {
  const todoEl   = document.getElementById('todo-list');
  const doneEl   = document.getElementById('done-list');
  const doneSec  = document.getElementById('done-section');
  const nights   = parseInt(document.getElementById('nights').value) || 0;
  const style    = document.getElementById('tripStyle').value;
  const area     = document.getElementById('area').value;

  todoEl.innerHTML = '';
  doneEl.innerHTML = '';

  // Build full master
  let fullMaster = [...packingMaster];
  if (area === 'overseas' && countryData[style]) {
    fullMaster = [{
      category:"🚩 渡航先別おすすめアイテム",
      items:[{name:"現地対策セット",subs:countryData[style].items}]
    }, ...fullMaster];
  }

  // Add scene categories
  if (area === 'overseas' && selectedScenes.length > 0) {
    selectedScenes.forEach(sc => {
      if (sceneItems[sc]) {
        fullMaster = [{
          category: sceneItems[sc].label,
          items: sceneItems[sc].items,
          isScene: true
        }, ...fullMaster];
      }
    });
  }

  // Custom items category
  if (customItems.length > 0) {
    fullMaster = [...fullMaster, {
      category:"✏️ カスタムアイテム",
      items: customItems.map(c => ({
        name: c.name,
        subs: c.memo ? [{t:c.memo}] : []
      })),
      isCustom: true
    }];
  }

  fullMaster.forEach(cat => {
    if (cat.isOverseas && area === 'domestic') return;
    let todoItems = [], doneItems = [];
    cat.items.forEach(item => {
      if (item.gender && item.gender !== currentGender) return;
      if (checkedItems.includes(item.name)) doneItems.push(item);
      else todoItems.push(item);
    });
    if (todoItems.length > 0) {
      todoEl.innerHTML += renderCategory(cat.category, todoItems, nights, cat.isCustom ? 'custom' : 'master');
    }
    if (doneItems.length > 0) {
      doneEl.innerHTML += doneItems.map(i => renderItem(i, nights, cat.isCustom ? 'custom' : 'master')).join('');
    }
  });

  doneSec.style.display = doneEl.innerHTML ? 'block' : 'none';
  updateProgress();
}

// ─── Item actions ─────────────────────────────────────────────────────────
function toggleParent(name) {
  if (checkedItems.includes(name)) checkedItems = checkedItems.filter(i => i !== name);
  else checkedItems.push(name);
  saveAll(); initList();
}
function toggleSub(id) {
  const key = 'sub_' + id;
  localStorage.setItem(key, localStorage.getItem(key) !== 'true');
  initList();
}
function deleteSub(e, id) {
  e.stopPropagation();
  if (confirm('この項目を削除しますか？')) { deletedSubs.push(id); saveAll(); initList(); }
}
function toggleFlag(e, name) {
  e.stopPropagation();
  const idx = flaggedItems.indexOf(name);
  if (idx >= 0) flaggedItems.splice(idx, 1);
  else flaggedItems.push(name);
  saveAll(); initList();
}

// ─── Custom items ─────────────────────────────────────────────────────────
function showAddForm() {
  document.getElementById('add-form').classList.add('visible');
  document.getElementById('btn-add-open').style.display = 'none';
  document.getElementById('custom-name').focus();
}
function hideAddForm() {
  document.getElementById('add-form').classList.remove('visible');
  document.getElementById('btn-add-open').style.display = 'block';
  document.getElementById('custom-name').value = '';
  document.getElementById('custom-memo').value = '';
}
function addCustomItem() {
  const name = document.getElementById('custom-name').value.trim();
  if (!name) { alert('アイテム名を入力してください。'); return; }
  if (customItems.some(c => c.name === name)) { alert('同じ名前のアイテムが既にあります。'); return; }
  const memo = document.getElementById('custom-memo').value.trim();
  customItems.push({name, memo});
  saveAll(); hideAddForm(); initList();
}
function deleteCustomItem(e, name) {
  e.stopPropagation();
  if (confirm(`「${name}」を削除しますか？`)) {
    customItems = customItems.filter(c => c.name !== name);
    checkedItems = checkedItems.filter(i => i !== name);
    flaggedItems = flaggedItems.filter(i => i !== name);
    saveAll(); initList();
  }
}

// ─── Reset ────────────────────────────────────────────────────────────────
function resetAll() {
  if (confirm('リセットしますか？チェック・フラグ・カスタムアイテムがすべて消えます。')) {
    checkedItems = []; deletedSubs = []; flaggedItems = [];
    customItems  = []; collapsedCats= []; selectedScenes = [];
    localStorage.clear();
    document.getElementById('area').value       = 'domestic';
    document.getElementById('nights').value     = '1';
    document.getElementById('tripStyle').value  = 'none';
    document.getElementById('travelMonth').value= '';
    document.getElementById('departDate').value = '';
    document.querySelectorAll('.scene-chip').forEach(b => b.classList.remove('active','suggested'));
    toggleOverseas();
    updateCountdown();
    setGender(currentGender);
  }
}

// ─── Export ───────────────────────────────────────────────────────────────
function exportPDF() {
  const noPrint = document.querySelectorAll('.no-print');
  noPrint.forEach(el => el.style.visibility = 'hidden');
  const el = document.getElementById('main-content');
  html2pdf().from(el).set({
    margin: 10,
    filename: 'packing-list.pdf',
    image: {type:'jpeg', quality:.97},
    html2canvas: {scale:2, useCORS:true},
    jsPDF: {unit:'mm', format:'a4', orientation:'portrait'}
  }).save().then(() => {
    noPrint.forEach(el => el.style.visibility = '');
  });
}

// ─── Init ─────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const get = k => localStorage.getItem(`${k}_${SV}`);
  if (get('area'))   document.getElementById('area').value       = get('area');
  if (get('nights')) document.getElementById('nights').value     = get('nights');
  if (get('style'))  document.getElementById('tripStyle').value  = get('style');
  if (get('month'))  document.getElementById('travelMonth').value= get('month');
  if (get('depart')) document.getElementById('departDate').value = get('depart');

  selectedScenes.forEach(s => {
    document.querySelector(`.scene-chip[data-scene="${s}"]`)?.classList.add('active');
  });

  toggleOverseas();
  updateCountryInfo();
  updateCountdown();
  updateSuggestedScenes();
  setGender(currentGender);
});
</script>
